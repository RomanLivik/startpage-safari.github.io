<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Start</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="/assets/css/style.css"
    />
  </head>
  <body>
    <canvas id="canvas"></canvas>

<div id="app">
  <div id="clock">00:00</div>

  <div id="search-container">
    <div id="search-form">
      <button id="engine-btn" title="Сменить поисковик">
        <span id="engine-icon">⌖</span>
      </button>
      <input
        id="search-input"
        type="text"
        autocomplete="off"
        spellcheck="false"
        placeholder="поиск или адрес..."
      />
      <button id="search-btn">→</button>
    </div>
    <div id="suggestions"></div>
    <div id="engine-menu"></div>
  </div>

  <div id="tabs-section">
    <div id="tabs-label">
      <span>закреплено</span>
      <button id="add-tab-btn" title="Добавить вкладку">+</button>
    </div>
    <div id="tabs-grid"></div>
  </div>
</div>

<div id="modal-overlay">
  <div id="modal">
    <h3>Новая вкладка</h3>
    <div class="modal-field">
      <label>Название</label>
      <input id="modal-name" type="text" placeholder="GitHub" />
    </div>
    <div class="modal-field">
      <label>URL</label>
      <input id="modal-url" type="text" placeholder="https://github.com" />
    </div>
    <div id="modal-actions">
      <button class="modal-btn" id="modal-cancel">Отмена</button>
      <button class="modal-btn primary" id="modal-save">Добавить</button>
    </div>
  </div>
</div>

    <script src="/assets/js/main.js"></script>
  </body>
</html>
