---
layout: default
title: Start
---

<canvas id="canvas"></canvas>

<div id="app">
  <div id="clock">00:00</div>

  <div id="search-container">
    <div id="search-form">
      <button id="engine-btn" title="Сменить поисковик">
        <span id="engine-icon">⌖</span>
      </button>
      <input
        id="search-input"
        type="text"
        autocomplete="off"
        spellcheck="false"
        placeholder="..." 
      />
      <button id="search-btn">→</button>
    </div>
    <div id="suggestions"></div>
    <div id="engine-menu"></div>
  </div>

  <div id="tabs-section">
    <div id="tabs-label">
      <span id="text-pinned">закреплено</span>
      <button id="add-tab-btn" title="+">+</button>
    </div>
    <div id="tabs-grid"></div>
  </div>
</div>

<div id="modal-overlay">
  <div id="modal">
    <h3 id="text-new-tab">Новая вкладка</h3>
    <div class="modal-field">
      <label id="text-name">Название</label>
      <input id="modal-name" type="text" placeholder="GitHub" />
    </div>
    <div class="modal-field">
      <label id="text-url">URL</label>
      <input id="modal-url" type="text" placeholder="https://github.com" />
    </div>
    <div id="modal-actions">
      <button class="modal-btn" id="modal-cancel">Отмена</button>
      <button class="modal-btn primary" id="modal-save">Добавить</button>
    </div>
  </div>
</div>
