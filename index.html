<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Start</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0a0a0a;
        --fg: #f0f0f0;
        --muted: #555;
        --border: #222;
        --hover-border: #444;
        --glass: rgba(255, 255, 255, 0.04);
        --glass-hover: rgba(255, 255, 255, 0.08);
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family: "DM Mono", monospace;
        overflow: hidden;
      }

      /* Canvas */
      #canvas {
        position: fixed;
        inset: 0;
        z-index: 0;
      }

      /*  Main layout */
      #app {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0;
      }

      /* Clock */
      #clock {
        font-family: "Instrument Serif", serif;
        font-size: clamp(3rem, 8vw, 7rem);
        font-weight: 400;
        letter-spacing: -0.02em;
        color: var(--fg);
        opacity: 0.12;
        line-height: 1;
        margin-bottom: 2.5rem;
        user-select: none;
        transition: opacity 0.3s;
      }
      #clock:hover {
        opacity: 0.22;
      }

      /* Search box */
      #search-container {
        width: min(680px, 90vw);
        position: relative;
      }

      #search-form {
        display: flex;
        align-items: center;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--glass);
        backdrop-filter: blur(12px);
        transition:
          border-color 0.2s,
          background 0.2s,
          box-shadow 0.2s;
        overflow: hidden;
      }
      #search-form:focus-within {
        border-color: var(--fg);
        background: rgba(255, 255, 255, 0.07);
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.1),
          0 8px 32px rgba(0, 0, 0, 0.5);
      }

      #engine-btn {
        padding: 0 14px 0 16px;
        background: none;
        border: none;
        cursor: pointer;
        color: var(--muted);
        font-size: 15px;
        display: flex;
        align-items: center;
        transition: color 0.2s;
        flex-shrink: 0;
      }
      #engine-btn:hover {
        color: var(--fg);
      }

      #search-input {
        flex: 1;
        padding: 14px 4px;
        background: none;
        border: none;
        outline: none;
        font-family: "DM Mono", monospace;
        font-size: 14px;
        font-weight: 300;
        color: var(--fg);
        caret-color: var(--fg);
        letter-spacing: 0.01em;
      }
      #search-input::placeholder {
        color: var(--muted);
      }

      #search-btn {
        padding: 0 16px;
        background: none;
        border: none;
        color: var(--muted);
        cursor: pointer;
        font-size: 15px;
        display: flex;
        align-items: center;
        transition: color 0.2s;
      }
      #search-btn:hover {
        color: var(--fg);
      }

      /* Suggestions dropdown */
      #suggestions {
        display: none;
        position: absolute;
        top: calc(100% + 4px);
        left: 0;
        right: 0;
        background: #111;
        border: 1px solid var(--border);
        border-radius: 6px;
        overflow: hidden;
        z-index: 100;
      }
      #suggestions.visible {
        display: block;
      }
      .suggestion-item {
        padding: 10px 16px;
        font-size: 13px;
        color: var(--muted);
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 10px;
        transition:
          background 0.1s,
          color 0.1s;
      }
      .suggestion-item:hover,
      .suggestion-item.active {
        background: var(--glass-hover);
        color: var(--fg);
      }
      .suggestion-item span.icon {
        font-size: 11px;
        opacity: 0.5;
      }

      /* Engine picker */
      #engine-menu {
        display: none;
        position: absolute;
        top: calc(100% + 4px);
        left: 0;
        background: #111;
        border: 1px solid var(--border);
        border-radius: 6px;
        overflow: hidden;
        z-index: 200;
        min-width: 140px;
      }
      #engine-menu.visible {
        display: block;
      }
      .engine-option {
        padding: 10px 16px;
        font-size: 12px;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--muted);
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 10px;
        transition:
          background 0.1s,
          color 0.1s;
      }
      .engine-option:hover {
        background: var(--glass-hover);
        color: var(--fg);
      }
      .engine-option.selected {
        color: var(--fg);
      }
      .engine-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--muted);
        flex-shrink: 0;
      }
      .engine-option.selected .engine-dot {
        background: var(--fg);
      }

      /* Pinned tabs */
      #tabs-section {
        margin-top: 2.5rem;
        width: min(680px, 90vw);
      }

      #tabs-label {
        font-size: 10px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 10px;
        padding-left: 2px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      #add-tab-btn {
        background: none;
        border: none;
        color: var(--muted);
        cursor: pointer;
        font-size: 16px;
        line-height: 1;
        padding: 0 2px;
        transition: color 0.2s;
        font-family: "DM Mono", monospace;
      }
      #add-tab-btn:hover {
        color: var(--fg);
      }

      #tabs-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
        gap: 8px;
      }

      .tab-card {
        position: relative;
        border: 1px solid var(--border);
        border-radius: 5px;
        padding: 12px 10px 10px;
        background: var(--glass);
        cursor: pointer;
        text-decoration: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 7px;
        transition:
          border-color 0.2s,
          background 0.2s,
          transform 0.15s;
        backdrop-filter: blur(8px);
        min-height: 72px;
        user-select: none;
      }
      .tab-card:hover {
        border-color: var(--hover-border);
        background: var(--glass-hover);
        transform: translateY(-1px);
      }

      .tab-favicon {
        width: 22px;
        height: 22px;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        filter: grayscale(1) contrast(1.2);
        flex-shrink: 0;
      }
      .tab-favicon img {
        width: 100%;
        height: 100%;
        border-radius: 3px;
      }

      .tab-name {
        font-size: 10px;
        color: var(--muted);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 100%;
        letter-spacing: 0.03em;
      }

      .tab-remove {
        position: absolute;
        top: 4px;
        right: 5px;
        background: none;
        border: none;
        color: transparent;
        cursor: pointer;
        font-size: 11px;
        line-height: 1;
        transition: color 0.15s;
        font-family: inherit;
      }
      .tab-card:hover .tab-remove {
        color: var(--muted);
      }
      .tab-remove:hover {
        color: var(--fg) !important;
      }

      /* Add tab */
      #modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        z-index: 300;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(4px);
      }
      #modal-overlay.visible {
        display: flex;
      }
      #modal {
        background: #111;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 24px;
        width: min(360px, 90vw);
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      #modal h3 {
        font-family: "Instrument Serif", serif;
        font-size: 18px;
        font-weight: 400;
        color: var(--fg);
      }
      .modal-field {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .modal-field label {
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .modal-field input {
        padding: 9px 12px;
        background: var(--glass);
        border: 1px solid var(--border);
        border-radius: 5px;
        color: var(--fg);
        font-family: "DM Mono", monospace;
        font-size: 13px;
        outline: none;
        transition: border-color 0.2s;
      }
      .modal-field input:focus {
        border-color: var(--fg);
      }
      #modal-actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        margin-top: 4px;
      }
      .modal-btn {
        padding: 8px 16px;
        border-radius: 4px;
        border: 1px solid var(--border);
        background: none;
        color: var(--muted);
        font-family: "DM Mono", monospace;
        font-size: 12px;
        cursor: pointer;
        letter-spacing: 0.05em;
        transition:
          border-color 0.2s,
          color 0.2s,
          background 0.2s;
      }
      .modal-btn:hover {
        border-color: var(--fg);
        color: var(--fg);
      }
      .modal-btn.primary {
        background: var(--fg);
        color: var(--bg);
        border-color: var(--fg);
      }
      .modal-btn.primary:hover {
        background: #ccc;
        border-color: #ccc;
      }

      /* Engine indicator */
      #engine-indicator {
        font-size: 10px;
        letter-spacing: 0.1em;
        color: #333;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <div id="app">
      <div id="clock">00:00</div>

      <div id="search-container">
        <div id="search-form">
          <button id="engine-btn" title="Сменить поисковик">
            <span id="engine-icon">⌖</span>
          </button>
          <input
            id="search-input"
            type="text"
            autocomplete="off"
            spellcheck="false"
            placeholder="поиск или адрес..."
          />
          <button id="search-btn">→</button>
        </div>
        <div id="suggestions"></div>
        <div id="engine-menu"></div>
      </div>

      <div id="tabs-section">
        <div id="tabs-label">
          <span>закреплено</span>
          <button id="add-tab-btn" title="Добавить вкладку">+</button>
        </div>
        <div id="tabs-grid" id="tabs-grid"></div>
      </div>
    </div>

    <div id="modal-overlay">
      <div id="modal">
        <h3>Новая вкладка</h3>
        <div class="modal-field">
          <label>Название</label>
          <input id="modal-name" type="text" placeholder="GitHub" />
        </div>
        <div class="modal-field">
          <label>URL</label>
          <input id="modal-url" type="text" placeholder="https://github.com" />
        </div>
        <div id="modal-actions">
          <button class="modal-btn" id="modal-cancel">Отмена</button>
          <button class="modal-btn primary" id="modal-save">Добавить</button>
        </div>
      </div>
    </div>

    <script>
      // Animations
      (function () {
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        let W,
          H,
          lines = [],
          nodes = [];

        function resize() {
          W = canvas.width = window.innerWidth;
          H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener("resize", resize);

        const N_NODES = 55;
        const MAX_DIST = 180;

        for (let i = 0; i < N_NODES; i++) {
          nodes.push({
            x: Math.random() * window.innerWidth,
            y: Math.random() * window.innerHeight,
            vx: (Math.random() - 0.5) * 0.28,
            vy: (Math.random() - 0.5) * 0.28,
            r: Math.random() * 1.2 + 0.3,
            phase: Math.random() * Math.PI * 2,
          });
        }

        let t = 0;
        function draw() {
          t += 0.008;
          ctx.clearRect(0, 0, W, H);

          for (let i = 0; i < 3; i++) {
            const cx = W * (0.2 + i * 0.3) + Math.sin(t * 0.3 + i) * 80;
            const cy = H * 0.5 + Math.cos(t * 0.2 + i * 1.4) * 60;
            const grad = ctx.createRadialGradient(
              cx,
              cy,
              0,
              cx,
              cy,
              280 + i * 40,
            );
            grad.addColorStop(0, `rgba(255,255,255,0.018)`);
            grad.addColorStop(1, `rgba(0,0,0,0)`);
            ctx.beginPath();
            ctx.arc(cx, cy, 380, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();
          }

          // Update
          for (let n of nodes) {
            n.x += n.vx;
            n.y += n.vy;
            if (n.x < 0 || n.x > W) n.vx *= -1;
            if (n.y < 0 || n.y > H) n.vy *= -1;
            const pulse = 0.5 + 0.5 * Math.sin(t * 1.2 + n.phase);
            ctx.beginPath();
            ctx.arc(n.x, n.y, n.r * (0.7 + 0.3 * pulse), 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,255,255,${0.12 + 0.08 * pulse})`;
            ctx.fill();
          }

          // Draw edges
          for (let i = 0; i < nodes.length; i++) {
            for (let j = i + 1; j < nodes.length; j++) {
              const dx = nodes[i].x - nodes[j].x;
              const dy = nodes[i].y - nodes[j].y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < MAX_DIST) {
                const alpha = (1 - dist / MAX_DIST) * 0.07;
                ctx.beginPath();
                ctx.moveTo(nodes[i].x, nodes[i].y);
                ctx.lineTo(nodes[j].x, nodes[j].y);
                ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
                ctx.lineWidth = 0.5;
                ctx.stroke();
              }
            }
          }

          requestAnimationFrame(draw);
        }
        draw();
      })();

      // Clock
      function updateClock() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, "0");
        const m = String(now.getMinutes()).padStart(2, "0");
        document.getElementById("clock").textContent = `${h}:${m}`;
      }
      updateClock();
      setInterval(updateClock, 10000);

      // Engines
      const ENGINES = [
        {
          id: "google",
          name: "Google",
          icon: "G",
          url: "https://www.google.com/search?q=",
        },
        {
          id: "duckduckgo",
          name: "DuckDuckGo",
          icon: "⬤",
          url: "https://duckduckgo.com/?q=",
        },
        {
          id: "bing",
          name: "Bing",
          icon: "B",
          url: "https://www.bing.com/search?q=",
        },
        {
          id: "brave",
          name: "Brave",
          icon: "▲",
          url: "https://search.brave.com/search?q=",
        },
        {
          id: "yandex",
          name: "Yandex",
          icon: "Я",
          url: "https://yandex.ru/search/?text=",
        },
      ];

      let currentEngine = localStorage.getItem("engine") || "google";

      function getEngine() {
        return ENGINES.find((e) => e.id === currentEngine) || ENGINES[0];
      }

      function renderEngineBtn() {
        document.getElementById("engine-icon").textContent = getEngine().icon;
      }

      function renderEngineMenu() {
        const menu = document.getElementById("engine-menu");
        menu.innerHTML = ENGINES.map(
          (e) => `
    <div class="engine-option ${e.id === currentEngine ? "selected" : ""}" data-id="${e.id}">
      <span class="engine-dot"></span>${e.name}
    </div>
  `,
        ).join("");
        menu.querySelectorAll(".engine-option").forEach((el) => {
          el.addEventListener("click", () => {
            currentEngine = el.dataset.id;
            localStorage.setItem("engine", currentEngine);
            renderEngineBtn();
            renderEngineMenu();
            closeEngineMenu();
          });
        });
      }

      let engineMenuOpen = false;
      function openEngineMenu() {
        engineMenuOpen = true;
        document.getElementById("engine-menu").classList.add("visible");
        renderEngineMenu();
      }
      function closeEngineMenu() {
        engineMenuOpen = false;
        document.getElementById("engine-menu").classList.remove("visible");
      }

      document.getElementById("engine-btn").addEventListener("click", (e) => {
        e.stopPropagation();
        engineMenuOpen ? closeEngineMenu() : openEngineMenu();
      });

      document.addEventListener("click", () => {
        closeEngineMenu();
        closeSuggestions();
      });

      renderEngineBtn();

      // Search
      function doSearch(q) {
        if (!q.trim()) return;
        // URL detection
        if (/^https?:\/\//i.test(q) || /^[a-z0-9-]+\.[a-z]{2,}/i.test(q)) {
          const url = /^https?:\/\//i.test(q) ? q : "https://" + q;
          window.location.href = url;
        } else {
          window.location.href = getEngine().url + encodeURIComponent(q);
        }
      }

      const searchInput = document.getElementById("search-input");
      document
        .getElementById("search-btn")
        .addEventListener("click", () => doSearch(searchInput.value));
      document
        .getElementById("search-form")
        .addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            const active = document.querySelector(".suggestion-item.active");
            if (active) doSearch(active.dataset.q);
            else doSearch(searchInput.value);
          }
          if (e.key === "Escape") {
            closeSuggestions();
            searchInput.blur();
          }
          if (e.key === "ArrowDown") navigateSuggestions(1);
          if (e.key === "ArrowUp") navigateSuggestions(-1);
        });

      // Suggestions
      const QUICK = [
        "youtube.com",
        "github.com",
        "wikipedia.org",
        "reddit.com",
        "x.com",
        "figma.com",
        "vercel.com",
        "notion.so",
        "linear.app",
      ];

      function renderSuggestions(val) {
        const box = document.getElementById("suggestions");
        if (!val.trim()) {
          closeSuggestions();
          return;
        }
        const matches = QUICK.filter((q) =>
          q.includes(val.toLowerCase()),
        ).slice(0, 4);
        const items = [
          { label: val, icon: "→", q: val },
          ...matches.map((m) => ({ label: m, icon: "⌁", q: m })),
        ].slice(0, 5);
        box.innerHTML = items
          .map(
            (it, i) =>
              `<div class="suggestion-item" data-q="${it.q}"><span class="icon">${it.icon}</span>${it.label}</div>`,
          )
          .join("");
        box.querySelectorAll(".suggestion-item").forEach((el) => {
          el.addEventListener("mousedown", (e) => {
            e.preventDefault();
            doSearch(el.dataset.q);
          });
        });
        box.classList.add("visible");
      }

      function closeSuggestions() {
        document.getElementById("suggestions").classList.remove("visible");
        document
          .querySelectorAll(".suggestion-item")
          .forEach((el) => el.classList.remove("active"));
      }

      function navigateSuggestions(dir) {
        const items = [...document.querySelectorAll(".suggestion-item")];
        if (!items.length) return;
        const cur = items.findIndex((el) => el.classList.contains("active"));
        items.forEach((el) => el.classList.remove("active"));
        let next = cur + dir;
        if (next < 0) next = items.length - 1;
        if (next >= items.length) next = 0;
        items[next].classList.add("active");
        searchInput.value = items[next].dataset.q;
      }

      searchInput.addEventListener("input", (e) =>
        renderSuggestions(e.target.value),
      );
      searchInput.addEventListener("focus", (e) => {
        if (e.target.value) renderSuggestions(e.target.value);
      });
      searchInput.addEventListener("click", (e) => e.stopPropagation());
      document
        .getElementById("suggestions")
        .addEventListener("click", (e) => e.stopPropagation());

      // Tabs
      const DEFAULT_TABS = [
        { name: "GitHub", url: "https://github.com", emoji: "⌥" },
        { name: "YouTube", url: "https://youtube.com", emoji: "▶" },
        { name: "Reddit", url: "https://reddit.com", emoji: "◈" },
        { name: "Figma", url: "https://figma.com", emoji: "◇" },
      ];

      let tabs =
        JSON.parse(localStorage.getItem("tabs") || "null") || DEFAULT_TABS;

      function saveTabs() {
        localStorage.setItem("tabs", JSON.stringify(tabs));
      }

      function getFavicon(url) {
        try {
          const domain = new URL(url).hostname;
          return `https://www.google.com/s2/favicons?domain=${domain}&sz=32`;
        } catch {
          return null;
        }
      }

      function renderTabs() {
        const grid = document.getElementById("tabs-grid");
        grid.innerHTML = "";
        tabs.forEach((tab, i) => {
          const favicon = getFavicon(tab.url);
          const card = document.createElement("a");
          card.className = "tab-card";
          card.href = tab.url;
          card.innerHTML = `
      <div class="tab-favicon">
        ${
          favicon
            ? `<img src="${favicon}" alt="" onerror="this.parentElement.textContent='${tab.emoji || "○"}'">`
            : `<span>${tab.emoji || "○"}</span>`
        }
      </div>
      <span class="tab-name">${tab.name}</span>
      <button class="tab-remove" data-i="${i}" title="Удалить">×</button>
    `;
          card.querySelector(".tab-remove").addEventListener("click", (e) => {
            e.preventDefault();
            e.stopPropagation();
            tabs.splice(i, 1);
            saveTabs();
            renderTabs();
          });
          grid.appendChild(card);
        });
      }

      renderTabs();

      // Modal
      const overlay = document.getElementById("modal-overlay");
      const modalName = document.getElementById("modal-name");
      const modalUrl = document.getElementById("modal-url");

      document.getElementById("add-tab-btn").addEventListener("click", () => {
        modalName.value = "";
        modalUrl.value = "";
        overlay.classList.add("visible");
        setTimeout(() => modalName.focus(), 50);
      });
      document
        .getElementById("modal-cancel")
        .addEventListener("click", () => overlay.classList.remove("visible"));
      overlay.addEventListener("click", (e) => {
        if (e.target === overlay) overlay.classList.remove("visible");
      });

      document.getElementById("modal-save").addEventListener("click", () => {
        const name = modalName.value.trim();
        const url = modalUrl.value.trim();
        if (!name || !url) return;
        const fullUrl = /^https?:\/\//i.test(url) ? url : "https://" + url;
        tabs.push({ name, url: fullUrl, emoji: "○" });
        saveTabs();
        renderTabs();
        overlay.classList.remove("visible");
      });

      document.getElementById("modal").addEventListener("keydown", (e) => {
        if (e.key === "Enter") document.getElementById("modal-save").click();
        if (e.key === "Escape") overlay.classList.remove("visible");
      });

      // Serach box focus when type
      document.addEventListener("keydown", (e) => {
        if (e.target.tagName === "INPUT" || e.target.tagName === "BUTTON")
          return;
        if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
          searchInput.focus();
        }
      });
    </script>
  </body>
</html>
